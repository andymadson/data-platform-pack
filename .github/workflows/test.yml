name: plugin-tests
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Offline harness (manifests, hooks, policy)
        run: node tests/run_tests.js
      - name: One-shot policy smoke (deny path exits 2)
        run: |
          node tests/try.js "rm -rf warehouse" && exit 1 || test $? -eq 2
      - name: Demo pipeline runs end to end
        run: |
          cd demo-project
          python3 pipelines/run.py all --target dev
